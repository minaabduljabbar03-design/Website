<html lang="en">
<head>

    <style>

        body{

        button{

</head>

<body>

    <h2>Welcome To</h2>
    <h1>MR Sweets</h1>

    <form action="page2.php" method="POST">

        <table>

            <tr>

                <td>
                    <img src="sweets imags/p1.jpg" alt="">
                    <h3>Chocolate Mousse</h3>
                    <h3>2000 IQD</h3>

                    <div class="controls">
                        <button type="button" onclick="updateQty(this,-1)">-</button>

                        <span class="counter-value">0</span>

                        <input type="hidden" name="chocolate_mousse" value="0">

                        <button type="button" onclick="updateQty(this,1)">+</button>
                    </div>
                </td>

                <td>
                    <img src="sweets imags/p2.jpg" alt="">
                    <h3>Chocolate Biscuit Roll</h3>
                    <h3>1500 IQD</h3>

                    <div class="controls">
                        <button type="button" onclick="updateQty(this,-1)">-</button>

                        <span class="counter-value">0</span>

                        <input type="hidden" name="biscuit_roll" value="0">

                        <button type="button" onclick="updateQty(this,1)">+</button>
                    </div>
                </td>

                <td>
                    <img src="sweets imags/p3.jpg" alt="">
                    <h3>French Macarons</h3>
                    <h3>1000 IQD</h3>

                    <div class="controls">
                        <button type="button" onclick="updateQty(this,-1)">-</button>

                        <span class="counter-value">0</span>

                        <input type="hidden" name="macarons" value="0">

                        <button type="button" onclick="updateQty(this,1)">+</button>
                    </div>
                </td>

            </tr>

            <tr>

                <td>
                    <img src="sweets imags/p4.jpg" alt="">
                    <h3>Chocolate Truffies</h3>
                    <h3>4500 IQD</h3>

                    <div class="controls">
                        <button type="button" onclick="updateQty(this,-1)">-</button>

                        <span class="counter-value">0</span>

                        <input type="hidden" name="truffies" value="0">

                        <button type="button" onclick="updateQty(this,1)">+</button>
                    </div>
                </td>

                <td>
                    <img src="sweets imags/p5.jpg" alt="">
                    <h3>Nutella Puff Pastry</h3>
                    <h3>5000 IQD</h3>

                    <div class="controls">
                        <button type="button" onclick="updateQty(this,-1)">-</button>

                        <span class="counter-value">0</span>

                        <input type="hidden" name="nutella" value="0">

                        <button type="button" onclick="updateQty(this,1)">+</button>
                    </div>
                </td>

                <td>

                    <h3>Churros</h3>

                        <input type="hidden" name="churros" value="0">

                        <button type="button" onclick="updateQty(this,1)">+</button>
                    </div>
                </td>

            </tr>

        </table>

        <div class="confirm">
            <button type="button" onclick="checkBeforeSend(this)">
                Confirm Order
            </button>
        </div>

    </form>

    <script>

        function updateQty(button, step)
        {
            const controlsDiv = button.parentElement;

            const counterSpan =
            controlsDiv.querySelector('.counter-value');

            const hiddenInput =
            controlsDiv.querySelector('input[type="hidden"]');

            let currentVal = parseInt(counterSpan.innerText);

            currentVal += step;

            if(currentVal < 0)
            {
                currentVal = 0;
            }

            counterSpan.innerText = currentVal;

            hiddenInput.value = currentVal;
        }


        function checkBeforeSend(button)
        {
            const quantities =
            document.querySelectorAll('input[type="hidden"]');

            let total = 0;

            quantities.forEach(function(input)
            {
                total += parseInt(input.value);
            });

            if(total > 0)
            {
                button.form.submit();
            }
            else
            {
                alert("Please select at least one item.");
            }
        }

    </script>

</body>
